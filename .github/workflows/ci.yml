name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-linux:
    name: Build & test InTheMomentCore (Linux)
    runs-on: ubuntu-22.04
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
