name: InTheMoment
options:
  bundleIdPrefix: com.inthemoment
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  InTheMomentCore:
    path: .

targets:
  InTheMoment:
    type: application
    platform: iOS
    sources:
      - path: App/InTheMoment
    dependencies:
      - package: InTheMomentCore
        product: InTheMomentCore
    info:
      path: App/InTheMoment/Info.plist
      properties:
        CFBundleDisplayName: In The Moment
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "Save event photos and videos to your library so you can use them however you like."
        NSPhotoLibraryUsageDescription: "Pick photos and videos from your library to post to your events."
        CFBundleURLTypes:
          - CFBundleURLName: com.inthemoment.app
            CFBundleURLSchemes:
              - inthemoment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inthemoment.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
