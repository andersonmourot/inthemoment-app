name: InTheMoment
options:
  bundleIdPrefix: com.inthemoment
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  InTheMomentCore:
    path: .

targets:
  InTheMoment:
    type: application
    platform: iOS
    sources:
      - path: App/InTheMoment
    dependencies:
      - package: InTheMomentCore
        product: InTheMomentCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.inthemoment.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: In The Moment
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save event photos and videos to your library so you can use them however you like."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Pick photos and videos from your library to post to your events."
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
